naftiko: 1.0.0-alpha2
info:
  label: MealMe Food Ordering API — Stores
  description: 'MealMe Food Ordering API — Stores. 4 operations. Lead operation: Get a MealMe Store. Self-contained Naftiko capability covering one MealMe business surface.'
  tags:
  - MealMe
  - Food Ordering
  - Stores
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MEALME_API_KEY: MEALME_API_KEY
capability:
  consumes:
  - type: http
    namespace: mealme-stores
    baseUri: https://api.mealme.ai
    description: MealMe Food Ordering API — Stores business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.MEALME_API_KEY}}'
      placement: header
    resources:
    - name: utils-store-lookup-v3
      path: /utils/store_lookup/v3
      operations:
      - name: storeLookup
        method: GET
        description: Get a MealMe Store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: store_ids
          in: query
          type: string
          required: true
          description: store_ids
        - name: use_new_db
          in: query
          type: boolean
          required: false
          description: use_new_db
    - name: utils-add-store
      path: /utils/add_store
      operations:
      - name: addStore
        method: GET
        description: Add a Google Place to MealMe
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: place_id
          in: query
          type: string
          required: true
          description: place_id
    - name: details-inventory-v4
      path: /details/inventory/v4
      operations:
      - name: getInventory
        method: GET
        description: Get Inventory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: store_id
          in: query
          type: string
          required: true
          description: store_id
        - name: subcategory_id
          in: query
          type: string
          required: false
          description: subcategory_id
        - name: pickup
          in: query
          type: boolean
          required: false
          description: pickup
        - name: include_quote
          in: query
          type: boolean
          required: false
          description: include_quote
        - name: include_customizations
          in: query
          type: boolean
          required: false
          description: include_customizations
        - name: available
          in: query
          type: boolean
          required: false
          description: available
        - name: page
          in: query
          type: integer
          required: false
          description: page
        - name: menu_id
          in: query
          type: string
          required: false
          description: menu_id
    - name: details-product-v2
      path: /details/product/v2
      operations:
      - name: getProductDetails
        method: GET
        description: Get Product Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: product_id
          in: query
          type: string
          required: true
          description: product_id
        - name: pickup
          in: query
          type: boolean
          required: false
          description: pickup
        - name: include_quote
          in: query
          type: boolean
          required: false
          description: include_quote
        - name: user_latitude
          in: query
          type: number
          required: false
          description: user_latitude
        - name: user_longitude
          in: query
          type: number
          required: false
          description: user_longitude
        - name: include_fees
          in: query
          type: boolean
          required: false
          description: include_fees
  exposes:
  - type: rest
    namespace: mealme-stores-rest
    port: 8080
    description: REST adapter for MealMe Food Ordering API — Stores. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/utils-store-lookup-v3
      name: utils-store-lookup-v3
      description: REST surface for Get a MealMe Store.
      operations:
      - method: GET
        name: storeLookup
        description: Get a MealMe Store
        call: mealme-stores.storeLookup
        with:
          store_ids: rest.store_ids
          use_new_db: rest.use_new_db
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/utils-add-store
      name: utils-add-store
      description: REST surface for Add a Google Place to MealMe.
      operations:
      - method: GET
        name: addStore
        description: Add a Google Place to MealMe
        call: mealme-stores.addStore
        with:
          place_id: rest.place_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/details-inventory-v4
      name: details-inventory-v4
      description: REST surface for Get Inventory.
      operations:
      - method: GET
        name: getInventory
        description: Get Inventory
        call: mealme-stores.getInventory
        with:
          store_id: rest.store_id
          subcategory_id: rest.subcategory_id
          pickup: rest.pickup
          include_quote: rest.include_quote
          include_customizations: rest.include_customizations
          available: rest.available
          page: rest.page
          menu_id: rest.menu_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/details-product-v2
      name: details-product-v2
      description: REST surface for Get Product Details.
      operations:
      - method: GET
        name: getProductDetails
        description: Get Product Details
        call: mealme-stores.getProductDetails
        with:
          product_id: rest.product_id
          pickup: rest.pickup
          include_quote: rest.include_quote
          user_latitude: rest.user_latitude
          user_longitude: rest.user_longitude
          include_fees: rest.include_fees
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mealme-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for MealMe Food Ordering API — Stores. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-mealme-store
      description: Get a MealMe Store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-stores.storeLookup
      with:
        store_ids: tools.store_ids
        use_new_db: tools.use_new_db
      outputParameters:
      - type: object
        mapping: $.
    - name: add-google-place-mealme
      description: Add a Google Place to MealMe
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-stores.addStore
      with:
        place_id: tools.place_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-inventory
      description: Get Inventory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-stores.getInventory
      with:
        store_id: tools.store_id
        subcategory_id: tools.subcategory_id
        pickup: tools.pickup
        include_quote: tools.include_quote
        include_customizations: tools.include_customizations
        available: tools.available
        page: tools.page
        menu_id: tools.menu_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product-details
      description: Get Product Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-stores.getProductDetails
      with:
        product_id: tools.product_id
        pickup: tools.pickup
        include_quote: tools.include_quote
        user_latitude: tools.user_latitude
        user_longitude: tools.user_longitude
        include_fees: tools.include_fees
      outputParameters:
      - type: object
        mapping: $.
