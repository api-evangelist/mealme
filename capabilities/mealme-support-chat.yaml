naftiko: 1.0.0-alpha2
info:
  label: MealMe Food Ordering API — Support Chat
  description: 'MealMe Food Ordering API — Support Chat. 5 operations. Lead operation: Initiate Customer Support Chat. Self-contained Naftiko capability covering one MealMe business surface.'
  tags:
  - MealMe
  - Food Ordering
  - Support Chat
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MEALME_API_KEY: MEALME_API_KEY
capability:
  consumes:
  - type: http
    namespace: mealme-support-chat
    baseUri: https://api.mealme.ai
    description: MealMe Food Ordering API — Support Chat business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.MEALME_API_KEY}}'
      placement: header
    resources:
    - name: chat-initiate
      path: /chat_initiate
      operations:
      - name: initiateChat
        method: POST
        description: Initiate Customer Support Chat
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: exit-chat
      path: /exit_chat
      operations:
      - name: exitChat
        method: POST
        description: Exit a Customer Support Chat
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
    - name: send-message
      path: /send_message
      operations:
      - name: sendMessage
        method: POST
        description: Send a Customer Support Chat Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
    - name: read-message
      path: /read_message
      operations:
      - name: readMessages
        method: POST
        description: Mark Chat Messages as Read
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
    - name: fetch-chat-ids
      path: /fetch_chat_ids
      operations:
      - name: fetchChatIds
        method: POST
        description: Fetch Customer Support Chat IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mealme-support-chat-rest
    port: 8080
    description: REST adapter for MealMe Food Ordering API — Support Chat. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/chat-initiate
      name: chat-initiate
      description: REST surface for Initiate Customer Support Chat.
      operations:
      - method: POST
        name: initiateChat
        description: Initiate Customer Support Chat
        call: mealme-support-chat.initiateChat
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/exit-chat
      name: exit-chat
      description: REST surface for Exit a Customer Support Chat.
      operations:
      - method: POST
        name: exitChat
        description: Exit a Customer Support Chat
        call: mealme-support-chat.exitChat
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/send-message
      name: send-message
      description: REST surface for Send a Customer Support Chat Message.
      operations:
      - method: POST
        name: sendMessage
        description: Send a Customer Support Chat Message
        call: mealme-support-chat.sendMessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/read-message
      name: read-message
      description: REST surface for Mark Chat Messages as Read.
      operations:
      - method: POST
        name: readMessages
        description: Mark Chat Messages as Read
        call: mealme-support-chat.readMessages
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fetch-chat-ids
      name: fetch-chat-ids
      description: REST surface for Fetch Customer Support Chat IDs.
      operations:
      - method: POST
        name: fetchChatIds
        description: Fetch Customer Support Chat IDs
        call: mealme-support-chat.fetchChatIds
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mealme-support-chat-mcp
    port: 9090
    transport: http
    description: MCP adapter for MealMe Food Ordering API — Support Chat. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: initiate-customer-support-chat
      description: Initiate Customer Support Chat
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mealme-support-chat.initiateChat
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: exit-customer-support-chat
      description: Exit a Customer Support Chat
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mealme-support-chat.exitChat
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: send-customer-support-chat-message
      description: Send a Customer Support Chat Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mealme-support-chat.sendMessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mark-chat-messages-read
      description: Mark Chat Messages as Read
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mealme-support-chat.readMessages
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-customer-support-chat-ids
      description: Fetch Customer Support Chat IDs
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: mealme-support-chat.fetchChatIds
      with: {}
      outputParameters:
      - type: object
        mapping: $.
