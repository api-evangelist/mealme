naftiko: 1.0.0-alpha2
info:
  label: MealMe Food Ordering API — Payments
  description: 'MealMe Food Ordering API — Payments. 4 operations. Lead operation: Create a Payment Method. Self-contained Naftiko capability covering one MealMe business surface.'
  tags:
  - MealMe
  - Food Ordering
  - Payments
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MEALME_API_KEY: MEALME_API_KEY
capability:
  consumes:
  - type: http
    namespace: mealme-payments
    baseUri: https://api.mealme.ai
    description: MealMe Food Ordering API — Payments business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.MEALME_API_KEY}}'
      placement: header
    resources:
    - name: payment-create-v2
      path: /payment/create/v2
      operations:
      - name: createPaymentMethod
        method: POST
        description: Create a Payment Method
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
    - name: payment-list
      path: /payment/list
      operations:
      - name: listPaymentMethods
        method: GET
        description: List Payment Methods
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: query
          type: string
          required: true
          description: user_id
        - name: user_email
          in: query
          type: string
          required: true
          description: user_email
    - name: payment-delete
      path: /payment/delete
      operations:
      - name: deletePaymentMethod
        method: POST
        description: Delete a Payment Method
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
    - name: get-payment-intent
      path: /get_payment_intent
      operations:
      - name: getPaymentIntent
        method: POST
        description: Get a Payment Intent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
  exposes:
  - type: rest
    namespace: mealme-payments-rest
    port: 8080
    description: REST adapter for MealMe Food Ordering API — Payments. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/payment-create-v2
      name: payment-create-v2
      description: REST surface for Create a Payment Method.
      operations:
      - method: POST
        name: createPaymentMethod
        description: Create a Payment Method
        call: mealme-payments.createPaymentMethod
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payment-list
      name: payment-list
      description: REST surface for List Payment Methods.
      operations:
      - method: GET
        name: listPaymentMethods
        description: List Payment Methods
        call: mealme-payments.listPaymentMethods
        with:
          user_id: rest.user_id
          user_email: rest.user_email
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payment-delete
      name: payment-delete
      description: REST surface for Delete a Payment Method.
      operations:
      - method: POST
        name: deletePaymentMethod
        description: Delete a Payment Method
        call: mealme-payments.deletePaymentMethod
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/get-payment-intent
      name: get-payment-intent
      description: REST surface for Get a Payment Intent.
      operations:
      - method: POST
        name: getPaymentIntent
        description: Get a Payment Intent
        call: mealme-payments.getPaymentIntent
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mealme-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for MealMe Food Ordering API — Payments. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-payment-method
      description: Create a Payment Method
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mealme-payments.createPaymentMethod
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-payment-methods
      description: List Payment Methods
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-payments.listPaymentMethods
      with:
        user_id: tools.user_id
        user_email: tools.user_email
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-payment-method
      description: Delete a Payment Method
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mealme-payments.deletePaymentMethod
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment-intent
      description: Get a Payment Intent
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: mealme-payments.getPaymentIntent
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
