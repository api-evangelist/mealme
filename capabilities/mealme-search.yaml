naftiko: 1.0.0-alpha2
info:
  label: MealMe Food Ordering API — Search
  description: 'MealMe Food Ordering API — Search. 4 operations. Lead operation: Search for a Store. Self-contained Naftiko capability covering one MealMe business surface.'
  tags:
  - MealMe
  - Food Ordering
  - Search
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MEALME_API_KEY: MEALME_API_KEY
capability:
  consumes:
  - type: http
    namespace: mealme-search
    baseUri: https://api.mealme.ai
    description: MealMe Food Ordering API — Search business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.MEALME_API_KEY}}'
      placement: header
    resources:
    - name: search-store-v3
      path: /search/store/v3
      operations:
      - name: searchStores
        method: GET
        description: Search for a Store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          required: false
          description: query
        - name: latitude
          in: query
          type: number
          required: true
          description: latitude
        - name: longitude
          in: query
          type: number
          required: true
          description: longitude
        - name: store_type
          in: query
          type: string
          required: false
          description: store_type
        - name: budget
          in: query
          type: number
          required: false
          description: budget
        - name: pickup
          in: query
          type: boolean
          required: false
          description: pickup
        - name: fetch_quotes
          in: query
          type: boolean
          required: false
          description: fetch_quotes
        - name: sort
          in: query
          type: string
          required: false
          description: sort
        - name: open
          in: query
          type: boolean
          required: false
          description: open
        - name: maximum_miles
          in: query
          type: number
          required: false
          description: maximum_miles
        - name: page
          in: query
          type: integer
          required: false
          description: page
    - name: search-product-v4
      path: /search/product/v4
      operations:
      - name: searchProducts
        method: GET
        description: Search for a Product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          required: false
          description: query
        - name: product_id
          in: query
          type: string
          required: false
          description: product_id
        - name: store_name
          in: query
          type: string
          required: false
          description: store_name
        - name: menu_id
          in: query
          type: string
          required: false
          description: menu_id
        - name: user_latitude
          in: query
          type: number
          required: true
          description: user_latitude
        - name: user_longitude
          in: query
          type: number
          required: true
          description: user_longitude
        - name: pickup
          in: query
          type: boolean
          required: false
          description: pickup
        - name: upc_codes
          in: query
          type: string
          required: false
          description: upc_codes
        - name: fetch_quotes
          in: query
          type: boolean
          required: false
          description: fetch_quotes
        - name: sort
          in: query
          type: string
          required: false
          description: sort
        - name: fuzzy_search
          in: query
          type: boolean
          required: false
          description: fuzzy_search
        - name: maximum_miles
          in: query
          type: number
          required: false
          description: maximum_miles
        - name: sale
          in: query
          type: boolean
          required: false
          description: sale
        - name: page
          in: query
          type: integer
          required: false
          description: page
    - name: search-cart
      path: /search/cart
      operations:
      - name: searchCart
        method: GET
        description: Search for a Cart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: places-search
      path: /places/search
      operations:
      - name: searchPlaces
        method: GET
        description: Search for a Place
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: search
          in: query
          type: string
          required: true
          description: search
        - name: location_bias_latitude
          in: query
          type: number
          required: false
          description: location_bias_latitude
        - name: location_bias_longitude
          in: query
          type: number
          required: false
          description: location_bias_longitude
        - name: location_bias_radius
          in: query
          type: integer
          required: false
          description: location_bias_radius
        - name: search_type
          in: query
          type: string
          required: false
          description: search_type
        - name: open_filter
          in: query
          type: boolean
          required: false
          description: open_filter
  exposes:
  - type: rest
    namespace: mealme-search-rest
    port: 8080
    description: REST adapter for MealMe Food Ordering API — Search. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/search-store-v3
      name: search-store-v3
      description: REST surface for Search for a Store.
      operations:
      - method: GET
        name: searchStores
        description: Search for a Store
        call: mealme-search.searchStores
        with:
          query: rest.query
          latitude: rest.latitude
          longitude: rest.longitude
          store_type: rest.store_type
          budget: rest.budget
          pickup: rest.pickup
          fetch_quotes: rest.fetch_quotes
          sort: rest.sort
          open: rest.open
          maximum_miles: rest.maximum_miles
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search-product-v4
      name: search-product-v4
      description: REST surface for Search for a Product.
      operations:
      - method: GET
        name: searchProducts
        description: Search for a Product
        call: mealme-search.searchProducts
        with:
          query: rest.query
          product_id: rest.product_id
          store_name: rest.store_name
          menu_id: rest.menu_id
          user_latitude: rest.user_latitude
          user_longitude: rest.user_longitude
          pickup: rest.pickup
          upc_codes: rest.upc_codes
          fetch_quotes: rest.fetch_quotes
          sort: rest.sort
          fuzzy_search: rest.fuzzy_search
          maximum_miles: rest.maximum_miles
          sale: rest.sale
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search-cart
      name: search-cart
      description: REST surface for Search for a Cart.
      operations:
      - method: GET
        name: searchCart
        description: Search for a Cart
        call: mealme-search.searchCart
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/places-search
      name: places-search
      description: REST surface for Search for a Place.
      operations:
      - method: GET
        name: searchPlaces
        description: Search for a Place
        call: mealme-search.searchPlaces
        with:
          search: rest.search
          location_bias_latitude: rest.location_bias_latitude
          location_bias_longitude: rest.location_bias_longitude
          location_bias_radius: rest.location_bias_radius
          search_type: rest.search_type
          open_filter: rest.open_filter
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mealme-search-mcp
    port: 9090
    transport: http
    description: MCP adapter for MealMe Food Ordering API — Search. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: search-store
      description: Search for a Store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-search.searchStores
      with:
        query: tools.query
        latitude: tools.latitude
        longitude: tools.longitude
        store_type: tools.store_type
        budget: tools.budget
        pickup: tools.pickup
        fetch_quotes: tools.fetch_quotes
        sort: tools.sort
        open: tools.open
        maximum_miles: tools.maximum_miles
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: search-product
      description: Search for a Product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-search.searchProducts
      with:
        query: tools.query
        product_id: tools.product_id
        store_name: tools.store_name
        menu_id: tools.menu_id
        user_latitude: tools.user_latitude
        user_longitude: tools.user_longitude
        pickup: tools.pickup
        upc_codes: tools.upc_codes
        fetch_quotes: tools.fetch_quotes
        sort: tools.sort
        fuzzy_search: tools.fuzzy_search
        maximum_miles: tools.maximum_miles
        sale: tools.sale
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: search-cart
      description: Search for a Cart
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-search.searchCart
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: search-place
      description: Search for a Place
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-search.searchPlaces
      with:
        search: tools.search
        location_bias_latitude: tools.location_bias_latitude
        location_bias_longitude: tools.location_bias_longitude
        location_bias_radius: tools.location_bias_radius
        search_type: tools.search_type
        open_filter: tools.open_filter
      outputParameters:
      - type: object
        mapping: $.
