naftiko: 1.0.0-alpha2
info:
  label: MealMe Food Ordering API — Carts
  description: 'MealMe Food Ordering API — Carts. 5 operations. Lead operation: Create a Cart. Self-contained Naftiko capability covering one MealMe business surface.'
  tags:
  - MealMe
  - Food Ordering
  - Carts
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    MEALME_API_KEY: MEALME_API_KEY
capability:
