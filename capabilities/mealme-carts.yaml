    namespace: mealme-carts
    baseUri: https://api.mealme.ai
    description: MealMe Food Ordering API — Carts business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.MEALME_API_KEY}}'
      placement: header
    resources:
    - name: cart-create
      path: /cart/create
      operations:
      - name: createCart
        method: POST
        description: Create a Cart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
    - name: cart-retrieve-v2
      path: /cart/retrieve/v2
      operations:
      - name: retrieveCart
        method: GET
        description: Retrieve a Cart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cart_id
          in: query
          type: string
          required: true
          description: cart_id
    - name: cart-list-v2
      path: /cart/list/v2
      operations:
      - name: listCarts
        method: GET
        description: List Carts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: add-to-cart
      path: /add_to_cart
      operations:
      - name: addToCart
        method: POST
        description: Add an Item to a Cart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
    - name: remove-from-cart
      path: /remove_from_cart
      operations:
      - name: removeFromCart
        method: POST
        description: Remove an Item from a Cart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
  exposes:
  - type: rest
    namespace: mealme-carts-rest
    port: 8080
    description: REST adapter for MealMe Food Ordering API — Carts. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/cart-create
      name: cart-create
      description: REST surface for Create a Cart.
      operations:
      - method: POST
        name: createCart
        description: Create a Cart
        call: mealme-carts.createCart
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cart-retrieve-v2
      name: cart-retrieve-v2
      description: REST surface for Retrieve a Cart.
      operations:
      - method: GET
        name: retrieveCart
        description: Retrieve a Cart
        call: mealme-carts.retrieveCart
        with:
          cart_id: rest.cart_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cart-list-v2
      name: cart-list-v2
      description: REST surface for List Carts.
      operations:
      - method: GET
        name: listCarts
        description: List Carts
        call: mealme-carts.listCarts
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/add-to-cart
      name: add-to-cart
      description: REST surface for Add an Item to a Cart.
      operations:
      - method: POST
        name: addToCart
        description: Add an Item to a Cart
        call: mealme-carts.addToCart
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/remove-from-cart
      name: remove-from-cart
      description: REST surface for Remove an Item from a Cart.
      operations:
      - method: POST
        name: removeFromCart
        description: Remove an Item from a Cart
        call: mealme-carts.removeFromCart
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
