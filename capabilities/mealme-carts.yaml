    port: 9090
    transport: http
    description: MCP adapter for MealMe Food Ordering API — Carts. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-cart
      description: Create a Cart
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mealme-carts.createCart
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-cart
      description: Retrieve a Cart
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-carts.retrieveCart
      with:
        cart_id: tools.cart_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-carts
      description: List Carts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mealme-carts.listCarts
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: add-item-cart
      description: Add an Item to a Cart
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mealme-carts.addToCart
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-item-cart
      description: Remove an Item from a Cart
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mealme-carts.removeFromCart
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
