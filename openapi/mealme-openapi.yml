openapi: 3.1.0
info:
  title: MealMe Food Ordering API
  version: "4.1.0"
  description: |
    MealMe provides a food and grocery ordering API for menus, inventory, and
    order placement at over one million restaurants and grocery stores in the
    United States and Canada. The API covers store and product search, store
    lookup, inventory/menu retrieval, product details, cart creation and
    management, order creation and finalization, payment methods, MealMe
    Connect accounts, customer support chat, order tracking webhooks, places
    search, and geocoding. Every menu item and grocery product returned
    includes real-time availability, prices, and customizations or modifiers.
    The current reference is version 4.1.0.

    Paths in this specification mirror the documented MealMe endpoints under
    https://api.mealme.ai (for example `/search/store/v3`, `/cart/create`,
    and `/order/order/v4`). Authentication uses an API key passed in the
    Authorization header.
  contact:
    name: MealMe API Reference
    url: https://docs.mealme.ai/reference
servers:
- url: https://api.mealme.ai
  description: MealMe production API
security:
- apiKeyHeader: []
tags:
- name: Search
  description: Store, product, and place search.
- name: Stores
  description: Store lookup, inventory, and product details.
- name: Carts
  description: Cart creation, retrieval, and item management.
- name: Orders
  description: Order creation, finalization, and history.
- name: Payments
  description: Payment method management and payment intents.
- name: Connect Accounts
  description: MealMe Connect account linking and ordering.
- name: Support Chat
  description: Customer support chat.
- name: Tracking
  description: Order tracking webhooks.
- name: Geocoding
  description: Address geocoding and reverse geocoding.
components:
  securitySchemes:
    apiKeyHeader:
      type: apiKey
      in: header
      name: Authorization
      description: API key issued by MealMe, passed in the Authorization header.
  schemas:
    CartItem:
      type: object
      required: [product_id]
      properties:
        product_id:
          type: string
          description: Product identifier from a search or inventory result.
          example: prod_5a3e9d12
        quantity:
          type: integer
          minimum: 1
          default: 1
          example: 1
        product_marked_price:
          type: integer
          description: Marked price in cents.
          example: 1299
        selected_options:
          type: array
          description: Selected product customizations and modifiers.
          items:
            type: object
          example: &id003 []
        notes:
          type: string
          description: Special instructions for the store.
          example: Leave at the front desk
    CartRequest:
      type: object
      required: [items, pickup, user_id]
      properties:
        cart_id:
          type: string
          description: ID of an existing cart to update.
          example: kQ8vZEd-UnW_gZu6c4iO
        items:
          type: array
          items: {$ref: "#/components/schemas/CartItem"}
        pickup:
          type: boolean
          description: Fulfillment type. true for pickup, false for delivery.
          example: false
        driver_tip_cents:
          type: integer
          default: 100
          example: 100
        user_latitude: {type: number, example: 37.7786357}
        user_longitude: {type: number, example: -122.3918135}
        user_street_num: {type: string, example: '188'}
        user_street_name: {type: string, example: King Street}
        user_apt_num: {type: string, example: example}
        user_city: {type: string, example: San Francisco}
        user_state: {type: string, example: CA}
        user_country: {type: string, enum: [US, CA], example: US}
        user_zipcode: {type: string, example: '94107'}
        user_dropoff_notes: {type: string, example: Leave at the front desk}
        user_name: {type: string, example: Steve Jobs}
        user_email: {type: string, format: email, example: diner@example.com}
        user_phone: {type: integer, example: 14155550123}
        user_id:
          type: string
          description: Unique self-provided customer user ID.
          example: user_abc123
        disable_sms: {type: boolean, default: false, example: false}
        customer_order_id: {type: string, example: id_7b2c4e}
        autofill_selected_options: {type: boolean, default: false, example: false}
    Cart:
      type: object
      properties:
        cart_id: {type: string, example: kQ8vZEd-UnW_gZu6c4iO}
        store_id: {type: string, example: 8c9f33d5-d138-4a49-9a4f-162f195c89b8}
        subtotal: {type: integer, description: Subtotal in cents., example: 1299}
        items:
          type: array
          items: {$ref: "#/components/schemas/CartItem"}
    OrderRequest:
      type: object
      required: [items, pickup, user_name, user_email, user_phone, user_id]
      properties:
        place_order:
          type: boolean
          description: When false, returns a finalizable quote rather than placing.
          example: false
        order_id: {type: string, example: ord_8f2a1c9b}
        items:
          type: array
          items: {$ref: "#/components/schemas/CartItem"}
        pickup: {type: boolean, example: false}
        scheduled_id: {type: string, example: id_7b2c4e}
        driver_tip_cents: {type: integer, example: 1299}
        pickup_tip_cents: {type: integer, example: 1299}
        user_latitude: {type: number, example: 37.7786357}
        user_longitude: {type: number, example: -122.3918135}
        user_street_num: {type: string, example: '188'}
        user_street_name: {type: string, example: King Street}
        user_apt_num: {type: string, example: example}
        user_city: {type: string, example: San Francisco}
        user_state: {type: string, example: CA}
        user_country: {type: string, enum: [US, CA], example: US}
        user_zipcode: {type: string, example: '94107'}
        user_dropoff_notes: {type: string, example: Leave at the front desk}
        user_pickup_notes: {type: string, example: Leave at the front desk}
        user_name: {type: string, example: Steve Jobs}
        user_email: {type: string, format: email, example: diner@example.com}
        user_phone: {type: integer, example: 14155550123}
        user_id: {type: string, example: user_abc123}
        payment_method_id: {type: string, example: id_7b2c4e}
        charge_user: {type: boolean, example: false}
        include_final_quote: {type: boolean, example: false}
        disable_sms: {type: boolean, example: false}
        customer_order_id: {type: string, example: id_7b2c4e}
        metadata: {type: object, example: &id004 {}}
        tracking_link: {type: string, example: https://example.com/webhook}
    Order:
      type: object
      properties:
        order_id: {type: string, example: ord_8f2a1c9b}
        cart_id: {type: string, example: kQ8vZEd-UnW_gZu6c4iO}
        status:
          type: string
          enum: [unplaced, awaiting_confirmation, in_progress, canceled, completed]
          example: unplaced
        total: {type: integer, description: Total in cents., example: 1299}
    Store:
      type: object
      properties:
        _id: {type: string, example: 8c9f33d5-d138-4a49-9a4f-162f195c89b8}
        name: {type: string, example: Tony's Pizza Napoletana}
        address: {type: string, example: '188 King Street, San Francisco, CA 94107'}
        type: {type: string, enum: [restaurant, grocery], example: restaurant}
        is_open: {type: boolean, example: false}
        phone_number: {type: string, example: '+14155550123'}
        cuisines: {type: array, items: {type: string}, example: &id001 [Pizza, Italian]}
        rating: {type: number, example: 4.5}
        miles: {type: number, example: 1.5}
        quotes: {type: array, items: {type: object}, example: &id002 []}
    Product:
      type: object
      properties:
        product_id: {type: string, example: prod_5a3e9d12}
        name: {type: string, example: Tony's Pizza Napoletana}
        price: {type: integer, description: Price in cents., example: 1299}
        available: {type: boolean, example: false}
        store_name: {type: string, example: Tony's Pizza Napoletana}
        menu_id: {type: string, example: id_7b2c4e}
    PaymentMethod:
      type: object
      properties:
        payment_method_id: {type: string, example: id_7b2c4e}
        type: {type: string, example: card}
        last4: {type: string, example: '4242'}
    PaymentMethodCreateRequest:
      type: object
      required: [user_email, user_id, payment_method]
      properties:
        user_email: {type: string, format: email, example: diner@example.com}
        user_id: {type: string, example: user_abc123}
        payment_method:
          type: object
          description: Payment method details.
          example: &id005 {}
paths:
  /search/store/v3:
    get:
      tags: [Search]
      operationId: searchStores
      summary: Search for a Store
      description: Search restaurants and grocery stores near a location.
      parameters:
      - {in: query, name: query, schema: {type: string}, example: pizza}
      - {in: query, name: latitude, required: true, schema: {type: number}, example: 37.7786357}
      - {in: query, name: longitude, required: true, schema: {type: number}, example: -122.3918135}
      - {in: query, name: store_type, schema: {type: string, enum: [restaurant, grocery]}, example: restaurant}
      - {in: query, name: budget, schema: {type: number, default: 20}, example: 20}
      - {in: query, name: pickup, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: fetch_quotes, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: sort, schema: {type: string, enum: [cheapest, fastest, rating, distance, relevance]}, example: cheapest}
      - {in: query, name: open, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: maximum_miles, schema: {type: number, default: 3}, example: 3}
      - {in: query, name: page, schema: {type: integer}, example: 0}
      responses:
        "200":
          description: Matching stores.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/Store"}
              examples:
                SearchStores200Example:
                  summary: Default searchStores 200 response
                  x-microcks-default: true
                  value:
                  - _id: 8c9f33d5-d138-4a49-9a4f-162f195c89b8
                    name: Tony's Pizza Napoletana
                    address: 188 King Street, San Francisco, CA 94107
                    type: restaurant
                    is_open: false
                    phone_number: '+14155550123'
                    cuisines: *id001
                    rating: 4.5
                    miles: 1.5
                    quotes: *id002
        "400": {description: Input Validation Error}
        "401": {description: Missing Authorization}
        "429": {description: Too Many Requests}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /search/product/v4:
    get:
      tags: [Search]
      operationId: searchProducts
      summary: Search for a Product
      description: Search products across restaurants, grocery, and retail stores.
      parameters:
      - {in: query, name: query, schema: {type: string}, example: pizza}
      - {in: query, name: product_id, schema: {type: string}, example: prod_5a3e9d12}
      - {in: query, name: store_name, schema: {type: string}, example: Tony's Pizza Napoletana}
      - {in: query, name: menu_id, schema: {type: string}, example: id_7b2c4e}
      - {in: query, name: user_latitude, required: true, schema: {type: number}, example: 37.7786357}
      - {in: query, name: user_longitude, required: true, schema: {type: number}, example: -122.3918135}
      - {in: query, name: pickup, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: upc_codes, schema: {type: string}, example: example}
      - {in: query, name: fetch_quotes, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: sort, schema: {type: string, enum: [relevance, cheapest, fastest, rating, distance]}, example: relevance}
      - {in: query, name: fuzzy_search, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: maximum_miles, schema: {type: number, default: 1.5}, example: 1.5}
      - {in: query, name: sale, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: page, schema: {type: integer}, example: 0}
      responses:
        "200":
          description: Matching products.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/Product"}
              examples:
                SearchProducts200Example:
                  summary: Default searchProducts 200 response
                  x-microcks-default: true
                  value:
                  - product_id: prod_5a3e9d12
                    name: Tony's Pizza Napoletana
                    price: 1299
                    available: false
                    store_name: Tony's Pizza Napoletana
                    menu_id: id_7b2c4e
        "400": {description: Input Validation Error}
        "401": {description: Missing Authorization}
        "429": {description: Too Many Requests}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /search/cart:
    get:
      tags: [Search]
      operationId: searchCart
      summary: Search for a Cart
      description: Search for a set of products to build a cart in one call.
      responses:
        "200":
          description: Cart search results.
        "401": {description: Missing Authorization}
        "429": {description: Too Many Requests}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /places/search:
    get:
      tags: [Search]
      operationId: searchPlaces
      summary: Search for a Place
      description: Search for a place or address with optional location bias.
      parameters:
      - {in: query, name: search, required: true, schema: {type: string}, example: pizza}
      - {in: query, name: location_bias_latitude, schema: {type: number}, example: 37.7786357}
      - {in: query, name: location_bias_longitude, schema: {type: number}, example: -122.3918135}
      - {in: query, name: location_bias_radius, schema: {type: integer, default: 10000}, example: 10000}
      - {in: query, name: search_type, schema: {type: string, enum: [place, address, addresses], default: place}, example: place}
      - {in: query, name: open_filter, schema: {type: boolean, default: false}, example: false}
      responses:
        "200": {description: Matching places.}
        "401": {description: Missing Authorization}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /utils/store_lookup/v3:
    get:
      tags: [Stores]
      operationId: storeLookup
      summary: Get a MealMe Store
      description: Fetch stores by a comma-delimited list of store IDs (max 50).
      parameters:
      - {in: query, name: store_ids, required: true, schema: {type: string}, example: 8c9f33d5-d138-4a49-9a4f-162f195c89b8}
      - {in: query, name: use_new_db, schema: {type: boolean, default: true}, example: true}
      responses:
        "200":
          description: Stores.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/Store"}
              examples:
                StoreLookup200Example:
                  summary: Default storeLookup 200 response
                  x-microcks-default: true
                  value:
                  - _id: 8c9f33d5-d138-4a49-9a4f-162f195c89b8
                    name: Tony's Pizza Napoletana
                    address: 188 King Street, San Francisco, CA 94107
                    type: restaurant
                    is_open: false
                    phone_number: '+14155550123'
                    cuisines: *id001
                    rating: 4.5
                    miles: 1.5
                    quotes: *id002
        "400": {description: Input Validation Error}
        "401": {description: Missing Authorization}
        "429": {description: Too Many Requests}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /utils/add_store:
    get:
      tags: [Stores]
      operationId: addStore
      summary: Add a Google Place to MealMe
      description: Add a store to MealMe by its Google Place identifier.
      parameters:
      - {in: query, name: place_id, required: true, schema: {type: string}, example: id_7b2c4e}
      responses:
        "200": {description: Store added.}
        "401": {description: Missing Authorization}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /details/inventory/v4:
    get:
      tags: [Stores]
      operationId: getInventory
      summary: Get Inventory
      description: Retrieve a store's menu or grocery inventory.
      parameters:
      - {in: query, name: store_id, required: true, schema: {type: string}, example: 8c9f33d5-d138-4a49-9a4f-162f195c89b8}
      - {in: query, name: subcategory_id, schema: {type: string}, example: id_7b2c4e}
      - {in: query, name: pickup, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: include_quote, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: include_customizations, schema: {type: boolean, default: true}, example: true}
      - {in: query, name: available, schema: {type: boolean, default: true}, example: true}
      - {in: query, name: page, schema: {type: integer}, example: 0}
      - {in: query, name: menu_id, schema: {type: string}, example: id_7b2c4e}
      responses:
        "200": {description: Inventory.}
        "400": {description: Input Validation Error}
        "401": {description: Missing Authorization}
        "429": {description: Too Many Requests}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /details/product/v2:
    get:
      tags: [Stores]
      operationId: getProductDetails
      summary: Get Product Details
      description: Retrieve details for a single product including customizations.
      parameters:
      - {in: query, name: product_id, required: true, schema: {type: string}, example: prod_5a3e9d12}
      - {in: query, name: pickup, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: include_quote, schema: {type: boolean, default: false}, example: false}
      - {in: query, name: user_latitude, schema: {type: number}, example: 37.7786357}
      - {in: query, name: user_longitude, schema: {type: number}, example: -122.3918135}
      - {in: query, name: include_fees, schema: {type: boolean, default: true}, example: true}
      responses:
        "200":
          description: Product.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Product"}
              examples:
                GetProductDetails200Example:
                  summary: Default getProductDetails 200 response
                  x-microcks-default: true
                  value:
                    product_id: prod_5a3e9d12
                    name: Tony's Pizza Napoletana
                    price: 1299
                    available: false
                    store_name: Tony's Pizza Napoletana
                    menu_id: id_7b2c4e
        "400": {description: Input Validation Error}
        "401": {description: Missing Authorization}
        "406": {description: Product Unavailable}
        "429": {description: Too Many Requests}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /cart/create:
    post:
      tags: [Carts]
      operationId: createCart
      summary: Create a Cart
      description: Create or update a cart from a list of products and a fulfillment mode.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/CartRequest"}
            examples:
              CreateCartRequestExample:
                summary: Default createCart request
                x-microcks-default: true
                value:
                  cart_id: kQ8vZEd-UnW_gZu6c4iO
                  items:
                  - product_id: prod_5a3e9d12
                    quantity: 1
                    product_marked_price: 1299
                    selected_options: *id003
                    notes: Leave at the front desk
                  pickup: false
                  driver_tip_cents: 100
                  user_latitude: 37.7786357
                  user_longitude: -122.3918135
                  user_street_num: '188'
                  user_street_name: King Street
                  user_apt_num: example
                  user_city: San Francisco
                  user_state: CA
                  user_country: US
                  user_zipcode: '94107'
                  user_dropoff_notes: Leave at the front desk
                  user_name: Steve Jobs
                  user_email: diner@example.com
                  user_phone: 14155550123
                  user_id: user_abc123
                  disable_sms: false
                  customer_order_id: id_7b2c4e
                  autofill_selected_options: false
      responses:
        "200":
          description: Cart created.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Cart"}
              examples:
                CreateCart200Example:
                  summary: Default createCart 200 response
                  x-microcks-default: true
                  value:
                    cart_id: kQ8vZEd-UnW_gZu6c4iO
                    store_id: 8c9f33d5-d138-4a49-9a4f-162f195c89b8
                    subtotal: 1299
                    items:
                    - product_id: prod_5a3e9d12
                      quantity: 1
                      product_marked_price: 1299
                      selected_options: *id003
                      notes: Leave at the front desk
        "400": {description: Input Validation Error}
        "401": {description: Missing Authorization}
        "429": {description: Too Many Requests}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /cart/retrieve/v2:
    get:
      tags: [Carts]
      operationId: retrieveCart
      summary: Retrieve a Cart
      description: Retrieve a previously created cart by its ID.
      parameters:
      - {in: query, name: cart_id, required: true, schema: {type: string}, example: kQ8vZEd-UnW_gZu6c4iO}
      responses:
        "200":
          description: Cart.
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Cart"}
              examples:
                RetrieveCart200Example:
                  summary: Default retrieveCart 200 response
                  x-microcks-default: true
                  value:
                    cart_id: kQ8vZEd-UnW_gZu6c4iO
                    store_id: 8c9f33d5-d138-4a49-9a4f-162f195c89b8
                    subtotal: 1299
                    items:
                    - product_id: prod_5a3e9d12
                      quantity: 1
                      product_marked_price: 1299
                      selected_options: *id003
                      notes: Leave at the front desk
        "400": {description: Input Validation Error}
        "401": {description: Missing Authorization}
        "404": {description: Unknown Cart ID}
        "429": {description: Too Many Requests}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /cart/list/v2:
    get:
      tags: [Carts]
      operationId: listCarts
      summary: List Carts
      description: List the carts associated with the account.
      responses:
        "200":
          description: Carts.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: "#/components/schemas/Cart"}
              examples:
                ListCarts200Example:
                  summary: Default listCarts 200 response
                  x-microcks-default: true
                  value:
                  - cart_id: kQ8vZEd-UnW_gZu6c4iO
                    store_id: 8c9f33d5-d138-4a49-9a4f-162f195c89b8
                    subtotal: 1299
                    items:
                    - {}
        "401": {description: Missing Authorization}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /add_to_cart:
    post:
      tags: [Carts]
      operationId: addToCart
      summary: Add an Item to a Cart
      description: Add one or more items to an existing cart.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cart_id, items]
              properties:
                cart_id: {type: string}
                items:
                  type: array
                  items: {$ref: "#/components/schemas/CartItem"}
            examples:
              AddToCartRequestExample:
                summary: Default addToCart request
                x-microcks-default: true
                value:
                  cart_id: kQ8vZEd-UnW_gZu6c4iO
                  items:
                  - product_id: prod_5a3e9d12
                    quantity: 1
                    product_marked_price: 1299
                    selected_options: *id003
                    notes: Leave at the front desk
      responses:
        "200":
          description: Cart updated.
        "400": {description: Input Validation Error}
        "401": {description: Missing Authorization}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /remove_from_cart:
    post:
      tags: [Carts]
      operationId: removeFromCart
      summary: Remove an Item from a Cart
      description: Remove an item from an existing cart.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cart_id, product_id]
              properties:
                cart_id: {type: string}
                product_id: {type: string}
            examples:
              RemoveFromCartRequestExample:
                summary: Default removeFromCart request
                x-microcks-default: true
                value:
                  cart_id: kQ8vZEd-UnW_gZu6c4iO
                  product_id: prod_5a3e9d12
      responses:
        "200": {description: Item removed.}
        "400": {description: Input Validation Error}
        "401": {description: Missing Authorization}
