aid: mealme
name: MealMe
description: >-
  MealMe provides the largest food ordering API, enabling developers to get menus, inventory, and send orders to the
  point of sale at over 1 million restaurants and grocery stores for pickup or delivery. Includes a Food Search API,
  Menu API, and Grocery Ordering API.
